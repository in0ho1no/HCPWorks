name: VSCode Extension Test

on:
  push:
    branches: [ main , develop, ]
  pull_request:
    branches: [ main , develop, ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  checks: write    # テスト結果を書き込むために必要

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: hcpworks/package-lock.json

      - name: Install dependencies
        working-directory: ./hcpworks
        run: npm ci

      - name: Lint
        working-directory: ./hcpworks
        run: npm run lint

      - name: Compile
        working-directory: ./hcpworks
        run: npm run compile

      - name: Run tests
        uses: GabrielBB/xvfb-action@b706e4e27b14669b486812790492dc50ca16b465 # v1.7
        with:
          working-directory: ./hcpworks
          run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: ./hcpworks/test-results

      - name: Test Report
        uses: dorny/test-reporter@31a54ee7ebcacc03a09ea97a7e5465a47b84aea5 # v1.9.1
        if: success() || failure()
        with:
          name: Mocha Tests
          path: ./hcpworks/test-results/*.xml
          reporter: java-junit
